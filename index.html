<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jiaqi | Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #1D1D1D;
    }
    /* 核心布局：主内容居中，联系方式自动贴底 */
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 20px;
    }
    /* 文字组垂直排列 */
    .text-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }
    .title {
      color: white;
      font-size: 18vw;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 400;
      line-height: 1;
    }
    .name {
      color: white;
      font-size: 6vw;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 400;
    }
    .desc {
      color: white;
      font-size: 3.5vw;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 200;
      line-height: 1.4;
    }
    /* 联系方式：贴底 + 缩小字号 + 底部留白 */
    .contact {
      margin-top: auto; /* 自动贴紧底部 */
      padding-bottom: 24px; /* 不贴死屏幕，留一点间距 */
      color: white;
      font-size: 14px; /* 字号大幅缩小 */
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 200;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text-group">
      <div class="title">Hi</div>
      <div class="name">I’m Jiaqi</div>
      <div class="desc">I'm a father, millionaire, law student and billionaire.</div>
    </div>
    <!-- 联系方式自动贴底 -->
    <div class="contact">Please feel free to contact me: hecafa93@163.com</div>
  </div>
</body>
</html>

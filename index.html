<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- 核心：适配所有移动设备的视口设置 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jiaqi | Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* 页面铺满屏幕，垂直+水平居中核心代码 */
    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1D1D1D;
    }
    /* 文字容器：垂直排列，统一间距 */
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px; /* 文字行间距 */
      padding: 0 20px; /* 防止手机屏幕文字贴边 */
      max-width: 90%; /* 限制最大宽度，避免文字过长 */
    }
    /* 响应式文字：自动适配屏幕大小 */
    .title {
      color: white;
      font-size: 18vw; /* 响应式字号，屏幕越大字越大 */
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 400;
      line-height: 1;
    }
    .name {
      color: white;
      font-size: 6vw;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 400;
    }
    .desc {
      color: white;
      font-size: 3.5vw;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 200;
      line-height: 1.4;
    }
    .contact {
      margin-top: 40px;
      color: white;
      font-size: 2.8vw;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 200;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Hi</div>
    <div class="name">I’m Jiaqi</div>
    <div class="desc">I'm a father, millionaire, law student and billionaire.</div>
    <div class="contact">Please feel free to contact me: hecafa93@163.com</div>
  </div>
</body>
</html>
